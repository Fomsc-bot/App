<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB AutoPost SaaS | Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080a0f;
            --bg-card: rgba(22, 26, 35, 0.7);
            --accent-cyan: #00d4ff;
            --accent-purple: #b06ef7;
            --accent-green: #00e5a0;
            --text-pri: #eaedf5;
            --text-muted: #6b7390;
            --border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-pri);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(176, 110, 247, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 5%; }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin: 4rem auto;
        }

        input {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: #080a0f;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-download {
            background: var(--accent-green);
            color: #080a0f;
            margin-top: 1rem;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #dashboard { display: none; }

        .stat-banner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.25rem;
            border-radius: 16px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .badge-paid { color: var(--accent-green); border: 1px solid var(--accent-green); padding: 2px 8px; border-radius: 100px; font-size: 0.7rem; }
        .badge-free { color: var(--accent-purple); border: 1px solid var(--accent-purple); padding: 2px 8px; border-radius: 100px; font-size: 0.7rem; }

        @media (max-width: 768px) {
            .dashboard-grid, .stat-banner {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">FB AUTOPOST PRO</div>
    <div id="user-info"></div>
</nav>

<div class="container">

    <!-- LOGIN -->
    <section id="auth-section">
        <div class="glass-card">
            <h1>SaaS Dashboard</h1>
            <p>Log in to manage your worker cloud</p>
            <input type="email" id="email-input" placeholder="Enter your email">
            <button class="btn btn-primary" onclick="login()">Access Dashboard</button>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard">

        <div class="stat-banner">
            <div class="stat-item">
                <div class="stat-label">Member Status</div>
                <div id="status-badge" class="stat-val"></div>
            </div>

            <div class="stat-item">
                <div class="stat-label">Posts Remaining</div>
                <div id="posts-left" class="stat-val"></div>
            </div>

            <div class="stat-item">
                <div class="stat-label">Price</div>
                <div id="current-price" class="stat-val"></div>
            </div>
        </div>

        <div class="dashboard-grid">

            <!-- LEFT PANEL -->
            <div class="panel">
                <h2>Campaign Configuration</h2>

                <input type="text" id="fb-url" value="https://www.facebook.com">
                <input type="text" id="niche" placeholder="fashion, beauty...">

                <button class="btn btn-primary" onclick="trigger()">🚀 Start Auto-Worker</button>

                <!-- 🔥 DOWNLOAD BUTTON -->
                <a href="https://drive.google.com/uc?export=download&id=1q87BciKpdrPhVuziL3Y0RQJzSy-gqi-I" target="_blank">
                    <button class="btn btn-download">⬇ Download Agent (.EXE)</button>
                </a>

                <p id="agent-msg"></p>
            </div>

            <!-- RIGHT PANEL -->
            <div class="panel">
                <h3>Sync Agent</h3>
                <input type="text" id="api-url-display" readonly>
                <button class="btn" onclick="copyAPI()">Copy URL</button>
            </div>

        </div>

    </section>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwHhQxvzbMpx7VfGDF0oL3W0m4MsxQ2fUvw0zfs-Tp5T1kvWxAXYsVoLl3mI9zOWMwkyg/exec";
let currentUser = null;

function login() {
    const email = document.getElementById('email-input').value;
    currentUser = { email: email, postCount: 0, isPaid: false, price: 10 };

    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    document.getElementById('user-info').innerText = email;
    document.getElementById('status-badge').innerText = "FREE";
    document.getElementById('posts-left').innerText = "5";
    document.getElementById('current-price').innerText = "$10/mo";
    document.getElementById('api-url-display').value = GAS_URL;
}

function trigger() {
    document.getElementById('agent-msg').innerText = "Open the downloaded EXE to start.";
}

function copyAPI() {
    const c = document.getElementById("api-url-display");
    c.select();
    document.execCommand("copy");
    alert("Copied!");
}

</script>

</body>
</html>
